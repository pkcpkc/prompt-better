name: iosAIBridge
options:
  bundleIdPrefix: ai
  deploymentTarget:
    iOS: 26.0
    macOS: 26.0
packages:
  Vapor:
    url: https://github.com/vapor/vapor.git
    from: 4.89.0
  AIPromptCore:
    path: ../../frameworks/AIPromptCore
targets:
  iosAIBridge:
    type: application
    platform: iOS
    sources:
      - path: Sources/App
    dependencies:
      - package: Vapor
        product: Vapor
      - package: AIPromptCore
        product: AIPromptCore
        embed: true
    settings:
      base:
        # Standard search paths for frameworks/libraries
        LD_RUNPATH_SEARCH_PATHS: $(inherited) @executable_path/Frameworks
        # Enable generic modern Swift concurrency settings
        OTHER_SWIFT_FLAGS: $(inherited) -Xfrontend -warn-concurrency -Xfrontend -enable-actor-data-race-checks
        # Set a default bundle ID
        PRODUCT_BUNDLE_IDENTIFIER: ai.iosAIBridge
        # App icon asset name
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: Sources/App/Info.plist
  macAIBridge:
    type: application
    platform: macOS
    sources:
      - path: Sources/App
    dependencies:
      - package: Vapor
        product: Vapor
      - package: AIPromptCore
        product: AIPromptCore
        embed: true
    settings:
      base:
        # Standard search paths for frameworks/libraries
        LD_RUNPATH_SEARCH_PATHS: $(inherited) @executable_path/Frameworks
        # Enable generic modern Swift concurrency settings
        OTHER_SWIFT_FLAGS: $(inherited) -Xfrontend -warn-concurrency -Xfrontend -enable-actor-data-race-checks
        # Set a default bundle ID
        PRODUCT_BUNDLE_IDENTIFIER: ai.macAIBridge
        # App icon asset name
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: Sources/App/Info.plist

